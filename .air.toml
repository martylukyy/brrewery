root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = ["serve"]
  bin = "./tmp/main"
  cmd = "go build -ldflags \"-X github.com/autobrr/brrewery/internal/buildinfo.Version=0.0.0-dev -X github.com/autobrr/brrewery/internal/buildinfo.Commit=$(git rev-parse HEAD 2>/dev/null || echo) -X github.com/autobrr/brrewery/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)\" -o ./tmp/main ./cmd/brrewery"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "web", "internal/web/dist", "ansible"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
