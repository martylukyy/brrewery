# brrewery dashboard vhost — HTTP redirects to HTTPS; API proxied to Go backend.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/ssl/brrewery/fullchain.pem;
    ssl_certificate_key /etc/ssl/brrewery/privkey.pem;
    include /etc/nginx/nginxconfig.io/ssl.conf;

    root /var/www/brrewery;
    index index.html;

    location /api/ {
        include /etc/nginx/nginxconfig.io/proxy.conf;
        proxy_pass http://127.0.0.1:8080;
    }

    location /health {
        include /etc/nginx/nginxconfig.io/proxy.conf;
        proxy_pass http://127.0.0.1:8080;
    }

    include /etc/nginx/brrewery/apps/*.conf;

    # The dashboard is a single page with no client-side router, so the only
    # valid document is "/". Resolve real files (and the "/" directory index),
    # otherwise 404 — falling back to /index.html would answer /notvalid/ with a
    # 200 and the dashboard, masking broken links and bad bookmarks.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
