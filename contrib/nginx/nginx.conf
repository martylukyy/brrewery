user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Shared snippets now live directly under /etc/nginx (not a subdir). They are
    # included explicitly rather than by a glob — a /etc/nginx/*.conf glob would
    # match nginx.conf itself and recurse.
    include /etc/nginx/general.conf;
    include /etc/nginx/ssl.conf;
    include /etc/nginx/security.conf;
    include /etc/nginx/proxy.conf;
    # The dashboard vhost is the default site (sites-enabled/default) and the only
    # server block; installed apps add location snippets (sites-enabled/*.conf) that
    # the vhost includes itself. Loading those here would put a location at the http
    # context and fail ("location directive is not allowed here"), so the vhost is
    # enabled as an extensionless symlink and included explicitly by that name.
    include /etc/nginx/sites-enabled/default;
}
