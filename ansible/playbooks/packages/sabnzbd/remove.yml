---
# Removes the SABnzbd-specific artifacts (service, config, source tree, nginx
# site). Shared external utilities (par2, unrar, unzip, 7zip, ...) are left in
# place because other packages may rely on them.
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    sabnzbd_install_dir: /opt/sabnzbd
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Stop and disable SABnzbd for brrewery user
      ansible.builtin.systemd:
        name: "sabnzbd@{{ brrewery_user }}.service"
        enabled: false
        state: stopped
        daemon_reload: true
      failed_when: false

    - name: Remove nginx reverse proxy for SABnzbd
      ansible.builtin.include_role:
        name: brrewery_nginx_site
        tasks_from: remove
      vars:
        brrewery_package_id: sabnzbd

    - name: Remove SABnzbd user config and data
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/sabnzbd"
        state: absent

    - name: Remove SABnzbd source tree
      ansible.builtin.file:
        path: "{{ sabnzbd_install_dir }}"
        state: absent

    - name: List remaining SABnzbd user service unit files
      ansible.builtin.shell: |
        set -o pipefail
        systemctl list-unit-files 'sabnzbd@*.service' --no-legend --no-pager 2>/dev/null || true
      register: sabnzbd_unit_files
      changed_when: false

    - name: Remove SABnzbd systemd template when no instances remain
      ansible.builtin.file:
        path: /etc/systemd/system/sabnzbd@.service
        state: absent
      when: sabnzbd_unit_files.stdout_lines | length == 0
      notify: Reload systemd

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
