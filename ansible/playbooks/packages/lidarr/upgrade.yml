---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    lidarr_install_dir: /opt/Lidarr
    lidarr_port: 8686
    lidarr_download_url: "https://lidarr.servarr.com/v1/update/master/updatefile?os=linux&runtime=netcore&arch=x64"
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Ensure Lidarr runtime dependencies are present
      ansible.builtin.apt:
        name: libicu-dev
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Download Lidarr release archive
      ansible.builtin.get_url:
        url: "{{ lidarr_download_url }}"
        dest: /tmp/lidarr.tar.gz
        mode: "0644"

    - name: Stop Lidarr before upgrade
      ansible.builtin.systemd:
        name: "lidarr@{{ brrewery_user }}.service"
        state: stopped
      failed_when: false

    - name: Remove previous Lidarr installation
      ansible.builtin.file:
        path: "{{ lidarr_install_dir }}"
        state: absent

    - name: Extract Lidarr into /opt
      ansible.builtin.unarchive:
        src: /tmp/lidarr.tar.gz
        dest: /opt
        remote_src: true

    - name: Set ownership of Lidarr installation
      ansible.builtin.file:
        path: "{{ lidarr_install_dir }}"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        recurse: true

    - name: Ensure Lidarr is enabled and running after upgrade
      ansible.builtin.systemd:
        name: "lidarr@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Configure nginx reverse proxy for lidarr
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_package_id: lidarr
        brrewery_package_web_path: /lidarr/
        brrewery_package_upstream: http://127.0.0.1:{{ lidarr_port }}
