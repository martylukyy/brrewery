---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    prowlarr_install_dir: /opt/Prowlarr
    prowlarr_port: 9696
    # Prowlarr is distributed as a self-contained .NET tarball from the Servarr
    # update service (not GitHub releases). linux, amd64.
    prowlarr_download_url: "https://prowlarr.servarr.com/v1/update/master/updatefile?os=linux&runtime=netcore&arch=x64"
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Ensure brrewery user home directory exists
      ansible.builtin.stat:
        path: "{{ brrewery_home }}"
      register: brrewery_home_dir

    - name: Fail when brrewery user home is missing
      ansible.builtin.fail:
        msg: "Home directory {{ brrewery_home }} for user {{ brrewery_user }} does not exist"
      when: not brrewery_home_dir.stat.exists

    - name: Require brrewery user password for Prowlarr authentication
      ansible.builtin.assert:
        that:
          - brrewery_user_password is defined
          - brrewery_user_password | length > 0
        fail_msg: brrewery_user_password must be supplied for prowlarr install

    - name: Install Prowlarr runtime dependencies
      ansible.builtin.apt:
        # libicu-dev pulls in the matching ICU runtime, which Prowlarr's bundled
        # .NET requires for globalization (it does not run in invariant mode).
        name: libicu-dev
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Stop Prowlarr before replacing files
      ansible.builtin.systemd:
        name: "prowlarr@{{ brrewery_user }}.service"
        state: stopped
      failed_when: false

    - name: Download Prowlarr release archive
      ansible.builtin.get_url:
        url: "{{ prowlarr_download_url }}"
        dest: /tmp/prowlarr.tar.gz
        mode: "0644"

    - name: Remove previous Prowlarr installation
      ansible.builtin.file:
        path: "{{ prowlarr_install_dir }}"
        state: absent

    - name: Ensure /opt exists
      ansible.builtin.file:
        path: /opt
        state: directory
        mode: "0755"

    - name: Extract Prowlarr into /opt
      ansible.builtin.unarchive:
        src: /tmp/prowlarr.tar.gz
        dest: /opt
        remote_src: true

    - name: Set ownership of Prowlarr installation
      ansible.builtin.file:
        path: "{{ prowlarr_install_dir }}"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        recurse: true

    - name: Ensure Prowlarr data directory exists
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/prowlarr"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0750"

    - name: Generate Prowlarr API key
      ansible.builtin.command: openssl rand -hex 16
      register: prowlarr_api_key_gen
      changed_when: false

    - name: Write Prowlarr config
      ansible.builtin.copy:
        dest: "{{ brrewery_home }}/.config/prowlarr/config.xml"
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0640"
        # Never clobber an existing config: the seeded ApiKey and the login user
        # Prowlarr stores must survive re-runs. Forms auth is enforced for every
        # request (Enabled, not DisabledForLocalAddresses) so the proxied login
        # actually applies; the user itself is provisioned via the API below.
        force: false
        content: |
          <Config>
            <BindAddress>127.0.0.1</BindAddress>
            <Port>{{ prowlarr_port }}</Port>
            <UrlBase>prowlarr</UrlBase>
            <ApiKey>{{ prowlarr_api_key_gen.stdout }}</ApiKey>
            <LaunchBrowser>False</LaunchBrowser>
            <AuthenticationMethod>Forms</AuthenticationMethod>
            <AuthenticationRequired>Enabled</AuthenticationRequired>
            <Branch>master</Branch>
            <LogLevel>info</LogLevel>
            <AnalyticsEnabled>False</AnalyticsEnabled>
          </Config>

    - name: Install Prowlarr systemd template unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/prowlarr@.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prowlarr service for %i
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=%i
          ExecStart={{ prowlarr_install_dir }}/Prowlarr -nobrowser -data=/home/%i/.config/prowlarr
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start Prowlarr for brrewery user
      ansible.builtin.systemd:
        name: "prowlarr@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Read Prowlarr config to resolve the API key
      ansible.builtin.slurp:
        src: "{{ brrewery_home }}/.config/prowlarr/config.xml"
      register: prowlarr_config_raw

    - name: Set Prowlarr API key fact
      ansible.builtin.set_fact:
        prowlarr_api_key: "{{ (prowlarr_config_raw.content | b64decode | regex_findall('<ApiKey>([^<]+)</ApiKey>')) | first }}"
      no_log: true

    - name: Wait for the Prowlarr API to be ready
      ansible.builtin.uri:
        # Prowlarr's API is v1 (Sonarr/Radarr use v3).
        url: "http://127.0.0.1:{{ prowlarr_port }}/prowlarr/api/v1/config/host"
        method: GET
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        status_code: 200
      register: prowlarr_host_config
      until: prowlarr_host_config.status == 200
      retries: 30
      delay: 5

    - name: Build Prowlarr authentication overrides
      ansible.builtin.set_fact:
        prowlarr_auth_overrides:
          authenticationMethod: forms
          authenticationRequired: enabled
          username: "{{ brrewery_user }}"
          password: "{{ brrewery_user_password }}"
          passwordConfirmation: "{{ brrewery_user_password }}"
      no_log: true

    - name: Configure Prowlarr forms authentication with brrewery credentials
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ prowlarr_port }}/prowlarr/api/v1/config/host/{{ prowlarr_host_config.json.id }}"
        method: PUT
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body: "{{ prowlarr_host_config.json | combine(prowlarr_auth_overrides) }}"
        status_code: [200, 202]
      register: prowlarr_auth_set
      no_log: true
      when: >-
        prowlarr_host_config.json.authenticationMethod | lower != 'forms'
        or (prowlarr_host_config.json.username | default('')) != brrewery_user

    - name: Restart Prowlarr to apply authentication
      ansible.builtin.systemd:
        name: "prowlarr@{{ brrewery_user }}.service"
        state: restarted
      when: prowlarr_auth_set is changed

    - name: Wait for Prowlarr to come back up after restart
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ prowlarr_port }}"
        timeout: 120
      when: prowlarr_auth_set is changed

    - name: Configure nginx reverse proxy for prowlarr
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_package_id: prowlarr
        brrewery_package_web_path: /prowlarr/
        brrewery_package_upstream: http://127.0.0.1:{{ prowlarr_port }}

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
