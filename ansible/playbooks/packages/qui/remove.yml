---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    qui_bin: /usr/local/bin/qui
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Stop and disable qui for brrewery user
      ansible.builtin.systemd:
        name: "qui@{{ brrewery_user }}.service"
        enabled: false
        state: stopped
        daemon_reload: true
      failed_when: false

    - name: Remove nginx reverse proxy for qui
      ansible.builtin.include_role:
        name: brrewery_nginx_site
        tasks_from: remove
      vars:
        brrewery_package_id: qui

    - name: Remove qui user config and data
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/qui"
        state: absent

    - name: Remove qui binary
      ansible.builtin.file:
        path: "{{ qui_bin }}"
        state: absent

    - name: List remaining qui user service unit files
      ansible.builtin.shell: |
        set -o pipefail
        systemctl list-unit-files 'qui@*.service' --no-legend --no-pager 2>/dev/null || true
      register: qui_unit_files
      changed_when: false

    - name: Remove qui systemd template when no instances remain
      ansible.builtin.file:
        path: /etc/systemd/system/qui@.service
        state: absent
      when: qui_unit_files.stdout_lines | length == 0
      notify: Reload systemd

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
