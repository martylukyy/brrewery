---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    autobrr_bin: /usr/local/bin/autobrr
    autobrr_port: 7474
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Fetch latest autobrr release metadata
      ansible.builtin.uri:
        url: https://api.github.com/repos/autobrr/autobrr/releases/latest
        return_content: true
      register: autobrr_release

    - name: Resolve autobrr linux amd64 download URL
      ansible.builtin.set_fact:
        autobrr_download_url: >-
          {{ autobrr_release.json.assets
             | selectattr('name', 'search', 'linux_x86_64')
             | map(attribute='browser_download_url')
             | first }}

    - name: Download autobrr release archive
      ansible.builtin.get_url:
        url: "{{ autobrr_download_url }}"
        dest: /tmp/autobrr.tar.gz
        force: true
        mode: "0644"

    - name: Ensure autobrr extract directory exists
      ansible.builtin.file:
        path: /tmp/autobrr-extract
        state: directory
        mode: "0755"

    - name: Extract autobrr binaries
      ansible.builtin.unarchive:
        src: /tmp/autobrr.tar.gz
        dest: /tmp/autobrr-extract
        remote_src: true

    - name: Install autobrr binary
      ansible.builtin.copy:
        src: /tmp/autobrr-extract/autobrr
        dest: "{{ autobrr_bin }}"
        mode: "0755"
        remote_src: true
      notify: Restart autobrr

    - name: Install autobrrctl binary
      ansible.builtin.copy:
        src: /tmp/autobrr-extract/autobrrctl
        dest: /usr/local/bin/autobrrctl
        mode: "0755"
        remote_src: true

    - name: Ensure autobrr baseUrl is configured
      ansible.builtin.lineinfile:
        path: "{{ brrewery_home }}/.config/autobrr/config.toml"
        regexp: '^baseUrl\s*='
        line: 'baseUrl = "/autobrr/"'
      notify: Restart autobrr

    - name: Ensure autobrr baseUrlModeLegacy is disabled
      ansible.builtin.lineinfile:
        path: "{{ brrewery_home }}/.config/autobrr/config.toml"
        regexp: '^baseUrlModeLegacy\s*='
        line: "baseUrlModeLegacy = false"
      notify: Restart autobrr

    - name: Configure nginx reverse proxy for autobrr
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_app_id: autobrr
        brrewery_app_web_path: /autobrr/
        brrewery_app_upstream: http://127.0.0.1:{{ autobrr_port }}

  handlers:
    - name: Restart autobrr
      ansible.builtin.systemd:
        name: "autobrr@{{ brrewery_user }}.service"
        state: restarted
