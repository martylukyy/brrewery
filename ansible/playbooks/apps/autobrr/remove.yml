---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    autobrr_bin: /usr/local/bin/autobrr
    autobrrctl_bin: /usr/local/bin/autobrrctl
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Stop and disable autobrr for brrewery user
      ansible.builtin.systemd:
        name: "autobrr@{{ brrewery_user }}.service"
        enabled: false
        state: stopped
        daemon_reload: true
      failed_when: false

    - name: Remove nginx reverse proxy for autobrr
      ansible.builtin.include_role:
        name: brrewery_nginx_site
        tasks_from: remove
      vars:
        brrewery_app_id: autobrr

    - name: Remove autobrr user config and data
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/autobrr"
        state: absent

    - name: Remove autobrr binary
      ansible.builtin.file:
        path: "{{ autobrr_bin }}"
        state: absent

    - name: Remove autobrrctl binary
      ansible.builtin.file:
        path: "{{ autobrrctl_bin }}"
        state: absent

    - name: List remaining autobrr user service unit files
      ansible.builtin.shell: |
        set -o pipefail
        systemctl list-unit-files 'autobrr@*.service' --no-legend --no-pager 2>/dev/null || true
      register: autobrr_unit_files
      changed_when: false

    - name: Remove autobrr systemd template when no instances remain
      ansible.builtin.file:
        path: /etc/systemd/system/autobrr@.service
        state: absent
      when: autobrr_unit_files.stdout_lines | length == 0
      notify: Reload systemd

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
