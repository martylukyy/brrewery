---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    autobrr_bin: /usr/local/bin/autobrr
    autobrr_port: 7474
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Ensure brrewery user home directory exists
      ansible.builtin.stat:
        path: "{{ brrewery_home }}"
      register: brrewery_home_dir

    - name: Fail when brrewery user home is missing
      ansible.builtin.fail:
        msg: "Home directory {{ brrewery_home }} for user {{ brrewery_user }} does not exist"
      when: not brrewery_home_dir.stat.exists

    - name: Ensure autobrr config directory exists
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/autobrr"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0750"

    - name: Fetch latest autobrr release metadata
      ansible.builtin.uri:
        url: https://api.github.com/repos/autobrr/autobrr/releases/latest
        return_content: true
      register: autobrr_release

    - name: Resolve autobrr linux amd64 download URL
      ansible.builtin.set_fact:
        autobrr_download_url: >-
          {{ autobrr_release.json.assets
             | selectattr('name', 'search', 'linux_x86_64')
             | map(attribute='browser_download_url')
             | first }}

    - name: Download autobrr release archive
      ansible.builtin.get_url:
        url: "{{ autobrr_download_url }}"
        dest: /tmp/autobrr.tar.gz
        mode: "0644"

    - name: Ensure autobrr extract directory exists
      ansible.builtin.file:
        path: /tmp/autobrr-extract
        state: directory
        mode: "0755"

    - name: Extract autobrr binaries
      ansible.builtin.unarchive:
        src: /tmp/autobrr.tar.gz
        dest: /tmp/autobrr-extract
        remote_src: true
        creates: /tmp/autobrr-extract/autobrr

    - name: Install autobrr binary
      ansible.builtin.copy:
        src: /tmp/autobrr-extract/autobrr
        dest: "{{ autobrr_bin }}"
        mode: "0755"
        remote_src: true

    - name: Install autobrrctl binary
      ansible.builtin.copy:
        src: /tmp/autobrr-extract/autobrrctl
        dest: /usr/local/bin/autobrrctl
        mode: "0755"
        remote_src: true

    - name: Generate autobrr session secret
      ansible.builtin.command: openssl rand -hex 16
      register: autobrr_session_secret
      changed_when: false

    - name: Write autobrr config
      ansible.builtin.copy:
        dest: "{{ brrewery_home }}/.config/autobrr/config.toml"
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0640"
        content: |
          host = "127.0.0.1"
          port = {{ autobrr_port }}
          baseUrl = "/autobrr/"
          baseUrlModeLegacy = false
          sessionSecret = "{{ autobrr_session_secret.stdout }}"

    - name: Require brrewery user password for autobrr account
      ansible.builtin.assert:
        that:
          - brrewery_user_password is defined
          - brrewery_user_password | length > 0
        fail_msg: brrewery_user_password must be supplied for autobrr install

    - name: Create autobrr user matching brrewery admin
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s\n%s\n' "$BRREWERY_USER_PASSWORD" "$BRREWERY_USER_PASSWORD" | \
          autobrrctl --config "{{ brrewery_home }}/.config/autobrr" create-user "{{ brrewery_user }}"
        touch "{{ brrewery_home }}/.config/autobrr/.brrewery-user-created"
      become: true
      become_user: "{{ brrewery_user }}"
      environment:
        BRREWERY_USER_PASSWORD: "{{ brrewery_user_password }}"
      args:
        creates: "{{ brrewery_home }}/.config/autobrr/.brrewery-user-created"
      no_log: true

    - name: Install autobrr systemd template unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/autobrr@.service
        mode: "0644"
        content: |
          [Unit]
          Description=autobrr service for %i
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=%i
          ExecStart={{ autobrr_bin }} --config=/home/%i/.config/autobrr
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start autobrr for brrewery user
      ansible.builtin.systemd:
        name: "autobrr@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Configure nginx reverse proxy for autobrr
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_app_id: autobrr
        brrewery_app_web_path: /autobrr/
        brrewery_app_upstream: http://127.0.0.1:{{ autobrr_port }}

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
