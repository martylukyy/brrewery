---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    qui_bin: /usr/local/bin/qui
    qui_port: 7476
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Ensure brrewery user home directory exists
      ansible.builtin.stat:
        path: "{{ brrewery_home }}"
      register: brrewery_home_dir

    - name: Fail when brrewery user home is missing
      ansible.builtin.fail:
        msg: "Home directory {{ brrewery_home }} for user {{ brrewery_user }} does not exist"
      when: not brrewery_home_dir.stat.exists

    - name: Ensure qui config directory exists
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/qui"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0750"

    - name: Fetch latest qui release metadata
      ansible.builtin.uri:
        url: https://api.github.com/repos/autobrr/qui/releases/latest
        return_content: true
      register: qui_release

    - name: Resolve qui linux amd64 download URL
      ansible.builtin.set_fact:
        qui_download_url: >-
          {{ qui_release.json.assets
             | selectattr('name', 'search', 'linux_x86_64')
             | map(attribute='browser_download_url')
             | first }}

    - name: Download qui release archive
      ansible.builtin.get_url:
        url: "{{ qui_download_url }}"
        dest: /tmp/qui.tar.gz
        mode: "0644"

    - name: Ensure qui extract directory exists
      ansible.builtin.file:
        path: /tmp/qui-extract
        state: directory
        mode: "0755"

    - name: Extract qui binary
      ansible.builtin.unarchive:
        src: /tmp/qui.tar.gz
        dest: /tmp/qui-extract
        remote_src: true
        creates: /tmp/qui-extract/qui

    - name: Install qui binary
      ansible.builtin.copy:
        src: /tmp/qui-extract/qui
        dest: "{{ qui_bin }}"
        mode: "0755"
        remote_src: true

    - name: Generate qui session secret
      ansible.builtin.command: openssl rand -hex 32
      register: qui_session_secret
      changed_when: false

    - name: Write qui config
      ansible.builtin.copy:
        dest: "{{ brrewery_home }}/.config/qui/config.toml"
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0640"
        force: false
        content: |
          host = "127.0.0.1"
          port = {{ qui_port }}
          baseUrl = "/qui/"
          sessionSecret = "{{ qui_session_secret.stdout }}"
          logLevel = "INFO"
          checkForUpdates = false

    - name: Require brrewery user password for qui account
      ansible.builtin.assert:
        that:
          - brrewery_user_password is defined
          - brrewery_user_password | length > 0
        fail_msg: brrewery_user_password must be supplied for qui install

    - name: Create qui user matching brrewery admin
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s\n' "$BRREWERY_USER_PASSWORD" | \
          "{{ qui_bin }}" create-user \
            --config-dir "{{ brrewery_home }}/.config/qui" \
            --username "{{ brrewery_user }}"
        touch "{{ brrewery_home }}/.config/qui/.brrewery-user-created"
      become: true
      become_user: "{{ brrewery_user }}"
      environment:
        BRREWERY_USER_PASSWORD: "{{ brrewery_user_password }}"
      args:
        creates: "{{ brrewery_home }}/.config/qui/.brrewery-user-created"
      no_log: true

    - name: Install qui systemd template unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/qui@.service
        mode: "0644"
        content: |
          [Unit]
          Description=qui service for %i
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=%i
          ExecStart={{ qui_bin }} serve --config-dir=/home/%i/.config/qui
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start qui for brrewery user
      ansible.builtin.systemd:
        name: "qui@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Configure nginx reverse proxy for qui
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_app_id: qui
        brrewery_app_web_path: /qui/
        brrewery_app_upstream: http://127.0.0.1:{{ qui_port }}

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
