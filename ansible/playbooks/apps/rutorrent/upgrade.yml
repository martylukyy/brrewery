---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    # Preserve per-user UI settings (share/) across the source refresh.
    rutorrent_preserve_share: true
  pre_tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set rtorrent home fact
      ansible.builtin.set_fact:
        rtorrent_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"
  roles:
    - brrewery_user
    - rutorrent
