---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    sonarr_install_dir: /opt/Sonarr
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Stop and disable Sonarr for brrewery user
      ansible.builtin.systemd:
        name: "sonarr@{{ brrewery_user }}.service"
        enabled: false
        state: stopped
        daemon_reload: true
      failed_when: false

    - name: Remove nginx reverse proxy for sonarr
      ansible.builtin.include_role:
        name: brrewery_nginx_site
        tasks_from: remove
      vars:
        brrewery_app_id: sonarr

    - name: Remove Sonarr user config and data
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/sonarr"
        state: absent

    - name: Remove Sonarr installation
      ansible.builtin.file:
        path: "{{ sonarr_install_dir }}"
        state: absent

    - name: List remaining sonarr user service unit files
      ansible.builtin.shell: |
        set -o pipefail
        systemctl list-unit-files 'sonarr@*.service' --no-legend --no-pager 2>/dev/null || true
      register: sonarr_unit_files
      changed_when: false

    - name: Remove sonarr systemd template when no instances remain
      ansible.builtin.file:
        path: /etc/systemd/system/sonarr@.service
        state: absent
      when: sonarr_unit_files.stdout_lines | length == 0
      notify: Reload systemd

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
