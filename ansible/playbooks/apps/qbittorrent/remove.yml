---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    qbittorrent_bin: /usr/local/bin/qbittorrent-nox
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Stop and disable qBittorrent for brrewery user
      ansible.builtin.systemd:
        name: "qbittorrent@{{ brrewery_user }}.service"
        enabled: false
        state: stopped
        daemon_reload: true
      failed_when: false

    - name: Remove nginx reverse proxy for qBittorrent
      ansible.builtin.include_role:
        name: brrewery_nginx_site
        tasks_from: remove
      vars:
        brrewery_app_id: qbittorrent

    - name: Remove qBittorrent user config and data
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/qBittorrent"
        state: absent

    - name: Remove qbittorrent-nox binary
      ansible.builtin.file:
        path: "{{ qbittorrent_bin }}"
        state: absent

    - name: List remaining qBittorrent user service unit files
      ansible.builtin.shell: |
        set -o pipefail
        systemctl list-unit-files 'qbittorrent@*.service' --no-legend --no-pager 2>/dev/null || true
      register: qbittorrent_unit_files
      changed_when: false

    - name: Remove qBittorrent systemd template when no instances remain
      ansible.builtin.file:
        path: /etc/systemd/system/qbittorrent@.service
        state: absent
      when: qbittorrent_unit_files.stdout_lines | length == 0
      notify: Reload systemd

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
