---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    filebrowser_bin: /usr/local/bin/filebrowser
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Stop and disable filebrowser for brrewery user
      ansible.builtin.systemd:
        name: "filebrowser@{{ brrewery_user }}.service"
        enabled: false
        state: stopped
        daemon_reload: true
      failed_when: false

    - name: Remove nginx reverse proxy for filebrowser
      ansible.builtin.include_role:
        name: brrewery_nginx_site
        tasks_from: remove
      vars:
        brrewery_app_id: filebrowser

    - name: Remove filebrowser user config and data
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/filebrowser"
        state: absent

    - name: Remove filebrowser binary
      ansible.builtin.file:
        path: "{{ filebrowser_bin }}"
        state: absent

    - name: List remaining filebrowser user service unit files
      ansible.builtin.shell: |
        set -o pipefail
        systemctl list-unit-files 'filebrowser@*.service' --no-legend --no-pager 2>/dev/null || true
      register: filebrowser_unit_files
      changed_when: false

    - name: Remove filebrowser systemd template when no instances remain
      ansible.builtin.file:
        path: /etc/systemd/system/filebrowser@.service
        state: absent
      when: filebrowser_unit_files.stdout_lines | length == 0
      notify: Reload systemd

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
