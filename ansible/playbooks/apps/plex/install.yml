---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    plex_port: 32400
    # Official Plex download API: lists the latest release for every platform.
    # We resolve the Debian .deb from here instead of adding Plex's apt repo.
    plex_downloads_api: https://plex.tv/api/downloads/5.json
    plex_deb_path: /tmp/plexmediaserver.deb
    # Plex's postinst drops an apt source so the OS package manager can upgrade
    # Plex; brrewery owns upgrades via this playbook, so the source is removed.
    plex_apt_source: /etc/apt/sources.list.d/plexmediaserver.list
    # ansible_architecture (uname -m) -> Plex "build" identifier for the .deb.
    plex_build_by_arch:
      x86_64: linux-x86_64
      aarch64: linux-aarch64
  roles:
    # Resolves brrewery_user (the admin OS account, passed by the install API)
    # and its primary group as brrewery_group — the group the plex service
    # account is added to so it can read that user's media.
    - brrewery_user
  tasks:
    - name: Require a Debian-family host for the Plex .deb
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "Plex is installed from a .deb and requires a Debian/Ubuntu host (found {{ ansible_os_family }})"

    - name: Resolve the Plex build for this architecture
      ansible.builtin.set_fact:
        plex_build: "{{ plex_build_by_arch[ansible_architecture] | default('') }}"

    - name: Fail on an unsupported architecture
      ansible.builtin.assert:
        that:
          - plex_build | length > 0
        fail_msg: "No Plex .deb is available for architecture {{ ansible_architecture }} (supported: {{ plex_build_by_arch.keys() | list | join(', ') }})"

    - name: Fetch the Plex download catalog
      ansible.builtin.uri:
        url: "{{ plex_downloads_api }}"
        return_content: true
      register: plex_catalog

    - name: Resolve the latest Plex version and .deb URL
      ansible.builtin.set_fact:
        plex_latest_version: "{{ plex_catalog.json.computer.Linux.version }}"
        plex_deb_url: >-
          {{ (plex_catalog.json.computer.Linux.releases
              | selectattr('distro', 'equalto', 'debian')
              | selectattr('build', 'equalto', plex_build)
              | map(attribute='url')
              | first) }}

    - name: Fail when no Plex .deb matched this host
      ansible.builtin.assert:
        that:
          - plex_deb_url | length > 0
        fail_msg: "No Plex .deb found for {{ ansible_architecture }} (distro=debian, build={{ plex_build }}); the Plex download API may have changed"

    - name: Read the installed Plex package version
      ansible.builtin.command: dpkg-query -W -f='${Version}' plexmediaserver
      register: plex_installed_version
      failed_when: false
      changed_when: false

    - name: Download the latest Plex .deb
      ansible.builtin.get_url:
        url: "{{ plex_deb_url }}"
        dest: "{{ plex_deb_path }}"
        mode: "0644"
      when: plex_installed_version.stdout != plex_latest_version

    - name: Install Plex from the downloaded .deb
      # dpkg, not apt: the package is fetched from the Plex download API, not an
      # apt repository. Plex's .deb bundles its runtime and has only base-system
      # dependencies that are already present on a brrewery host.
      ansible.builtin.command: dpkg --install "{{ plex_deb_path }}"
      register: plex_dpkg
      when: plex_installed_version.stdout != plex_latest_version
      changed_when: plex_dpkg.rc == 0

    - name: Remove the leftover Plex .deb
      ansible.builtin.file:
        path: "{{ plex_deb_path }}"
        state: absent

    - name: Disable the apt source the Plex package installs
      ansible.builtin.file:
        path: "{{ plex_apt_source }}"
        state: absent

    - name: Enable and start the Plex service
      ansible.builtin.systemd:
        name: plexmediaserver.service
        enabled: true
        state: started
        daemon_reload: true

    - name: Add the plex service user to the brrewery group
      ansible.builtin.user:
        name: plex
        groups: "{{ brrewery_group }}"
        append: true
      notify: Restart Plex

    - name: Look up the brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set the brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Read the brrewery home directory mode
      ansible.builtin.stat:
        path: "{{ brrewery_home }}"
      register: brrewery_home_stat

    - name: Open the brrewery home to its group so Plex can enter
      ansible.builtin.file:
        path: "{{ brrewery_home }}"
        mode: "0750"
      when:
        - brrewery_home_stat.stat.exists
        - brrewery_home_stat.stat.mode == "0700"

    - name: Apply pending handlers before reporting status
      ansible.builtin.meta: flush_handlers

    - name: Claim Plex in your browser
      ansible.builtin.debug:
        msg:
          - "Plex is now installed and running."
          - "Claim it by clicking the Plex app in the sidebar."

  handlers:
    - name: Restart Plex
      ansible.builtin.systemd:
        name: plexmediaserver.service
        state: restarted