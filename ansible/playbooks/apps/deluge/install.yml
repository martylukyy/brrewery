---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  roles:
    - brrewery_user
    - deluge_build
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory facts
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"
        deluge_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Check brrewery user home exists
      ansible.builtin.stat:
        path: "{{ brrewery_home }}"
      register: brrewery_home_dir

    - name: Assert brrewery user home exists
      ansible.builtin.assert:
        that:
          - brrewery_home_dir.stat.exists
        fail_msg: "Home directory {{ brrewery_home }} for user {{ brrewery_user }} does not exist"

    - name: Ensure Deluge config and download directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0750"
      loop:
        - "{{ deluge_config_dir }}"
        - "{{ deluge_download_dir }}"

    - name: Install Deluge systemd template units
      ansible.builtin.include_role:
        name: deluge_build
        tasks_from: service_unit.yml

    - name: Enable and start the Deluge daemon for brrewery user
      ansible.builtin.systemd:
        name: "deluged@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for the Deluge daemon RPC port to listen
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ deluge_daemon_port }}"
        timeout: 60

    - name: Require the resolved Deluge WebUI password hash
      ansible.builtin.assert:
        that:
          - deluge_webui_password_salt is defined
          - deluge_webui_password_salt | length > 0
          - deluge_webui_password_sha1 is defined
          - deluge_webui_password_sha1 | length > 0
        fail_msg: >-
          deluge_webui_password_salt/deluge_webui_password_sha1 must be supplied
          (brrewery hashes brrewery_user_password before the playbook runs)

    # deluge-web caches web.conf in memory and rewrites it on save, so a running
    # instance (e.g. a re-install) would clobber the password we write below.
    - name: Stop the Deluge WebUI before writing its password
      ansible.builtin.systemd:
        name: "deluge-web@{{ brrewery_user }}.service"
        state: stopped
        daemon_reload: true
      failed_when: false

    # Deluge's WebUI login password lives in web.conf as pwd_sha1 = sha1(pwd_salt
    # + password); brrewery computes both in Go (see internal/apps/deluge) so the
    # plaintext never reaches Ansible. web.conf is written as a single JSON object:
    # deluge-web loads a header-less config and merges its own defaults under it,
    # so the rest of the WebUI settings stay at their defaults. Do NOT prepend a
    # {"file": 1, ...} version header — that triggers Deluge's 1->2 config
    # migration, which rewrites the file. deluge-web reads this on next start.
    #
    # first_login=false suppresses the WebUI's "Change Default Password" dialog,
    # which deluge-web (ConnectionManager.js onLogin) shows whenever the
    # first_login flag is set — it never checks whether the password is still the
    # default, so without this the user is prompted despite the password we set.
    - name: Set the Deluge WebUI password in web.conf
      ansible.builtin.copy:
        dest: "{{ deluge_config_dir }}/web.conf"
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0600"
        force: true
        content: |
          {
              "pwd_salt": "{{ deluge_webui_password_salt }}",
              "pwd_sha1": "{{ deluge_webui_password_sha1 }}",
              "first_login": false
          }

    - name: Enable and start the Deluge WebUI for brrewery user
      ansible.builtin.systemd:
        name: "deluge-web@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for the Deluge WebUI to listen
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ deluge_web_port }}"
        timeout: 60

    - name: Configure nginx reverse proxy for Deluge
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_app_id: deluge
        brrewery_app_web_path: "{{ deluge_web_base }}"
        brrewery_app_upstream: "http://127.0.0.1:{{ deluge_web_port }}"
        # deluge-web is told its base path with -b, so it serves the full
        # {{ deluge_web_base }} URI directly; do not strip the prefix.
        brrewery_app_strip_path_prefix: false

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
