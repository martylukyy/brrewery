---
# Installs SABnzbd from source following the upstream "install off modules"
# method (https://sabnzbd.org/wiki/installation/install-off-modules): clone the
# master branch, create a virtualenv, and install the Python requirements into
# it. All Must-have and Optional external utilities listed by the wiki are
# installed too (par2, unrar, unzip, 7zip, nice, ionice, notify-osd).
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    sabnzbd_install_dir: /opt/sabnzbd
    sabnzbd_venv_dir: /opt/sabnzbd/venv
    sabnzbd_repo: https://github.com/sabnzbd/sabnzbd.git
    sabnzbd_port: 8085
    # Official RARLAB unrar is not in Debian main, so it is compiled from source
    # to satisfy the wiki's "unrar release 5.5 or higher" requirement.
    sabnzbd_unrar_version: 7.1.10
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Refresh apt cache (best effort)
      ansible.builtin.apt:
        update_cache: true
      failed_when: false

    - name: Install SABnzbd source build and runtime dependencies
      ansible.builtin.apt:
        name:
          - git
          - python3
          - python3-venv
          - python3-pip
          - python3-dev
          - build-essential
          - libffi-dev
          - libssl-dev
          - ca-certificates
          # gettext provides msgfmt, used by tools/make_mo.py for translations.
          - gettext
        state: present

    - name: Install SABnzbd Must-have utilities
      ansible.builtin.apt:
        name:
          - par2
        state: present

    - name: Install SABnzbd Optional utilities
      ansible.builtin.apt:
        name:
          - unzip          # password-protected zip extraction (-P)
          - p7zip-full     # provides the 7z / 7za commands SABnzbd looks for
          - coreutils      # provides nice (external-tool CPU priority)
          - util-linux     # provides ionice (external-tool disk priority)
          - notify-osd     # desktop notifications
        state: present

    # unrar (Must-have): build the official RARLAB binary from source because
    # Debian main ships only the incompatible unrar-free.
    - name: Check for an existing unrar binary
      ansible.builtin.stat:
        path: /usr/local/bin/unrar
      register: sabnzbd_unrar

    - name: Build and install the official RARLAB unrar from source
      when: not sabnzbd_unrar.stat.exists
      block:
        - name: Create unrar build directory
          ansible.builtin.file:
            path: /tmp/sabnzbd-unrar
            state: directory
            mode: "0755"

        - name: Download official unrar source
          ansible.builtin.get_url:
            url: "https://www.rarlab.com/rar/unrarsrc-{{ sabnzbd_unrar_version }}.tar.gz"
            dest: /tmp/sabnzbd-unrar/unrarsrc.tar.gz
            mode: "0644"

        - name: Extract unrar source
          ansible.builtin.unarchive:
            src: /tmp/sabnzbd-unrar/unrarsrc.tar.gz
            dest: /tmp/sabnzbd-unrar
            remote_src: true
            creates: /tmp/sabnzbd-unrar/unrar/makefile

        - name: Compile unrar
          ansible.builtin.command:
            cmd: make
            chdir: /tmp/sabnzbd-unrar/unrar
            creates: /tmp/sabnzbd-unrar/unrar/unrar

        - name: Install unrar binary
          ansible.builtin.copy:
            src: /tmp/sabnzbd-unrar/unrar/unrar
            dest: /usr/local/bin/unrar
            mode: "0755"
            remote_src: true
      always:
        - name: Clean up unrar build directory
          ansible.builtin.file:
            path: /tmp/sabnzbd-unrar
            state: absent

    - name: Clone SABnzbd master branch
      ansible.builtin.git:
        repo: "{{ sabnzbd_repo }}"
        dest: "{{ sabnzbd_install_dir }}"
        version: master
        depth: 1
        force: true

    - name: Create SABnzbd virtualenv
      ansible.builtin.command:
        cmd: python3 -m venv "{{ sabnzbd_venv_dir }}"
        creates: "{{ sabnzbd_venv_dir }}/bin/python"

    - name: Upgrade pip and wheel in the virtualenv
      ansible.builtin.pip:
        name:
          - pip
          - wheel
        state: latest
        virtualenv: "{{ sabnzbd_venv_dir }}"

    - name: Install SABnzbd Python requirements into the virtualenv
      ansible.builtin.pip:
        requirements: "{{ sabnzbd_install_dir }}/requirements.txt"
        virtualenv: "{{ sabnzbd_venv_dir }}"
        extra_args: --upgrade

    - name: Compile SABnzbd translations
      ansible.builtin.command:
        cmd: "{{ sabnzbd_venv_dir }}/bin/python tools/make_mo.py"
        chdir: "{{ sabnzbd_install_dir }}"
      changed_when: true
      # Translations are cosmetic; a failure here must not abort the install.
      failed_when: false

    - name: Ensure SABnzbd config directory exists
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/sabnzbd"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0750"

    - name: Require brrewery user password for SABnzbd account
      ansible.builtin.assert:
        that:
          - brrewery_user_password is defined
          - brrewery_user_password | length > 0
        fail_msg: brrewery_user_password must be supplied for sabnzbd install

    - name: Set SABnzbd ini path
      ansible.builtin.set_fact:
        sabnzbd_ini: "{{ brrewery_home }}/.config/sabnzbd/sabnzbd.ini"

    # Seed only the [misc] header so the keys below land in a section. The rest
    # of the file (api_key, servers, the user's own settings) is managed by
    # SABnzbd and preserved across reinstalls — we only set the keys we own.
    - name: Ensure SABnzbd ini exists with a misc section
      ansible.builtin.copy:
        dest: "{{ sabnzbd_ini }}"
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0600"
        force: false
        content: |
          [misc]

    # SABnzbd stores the WebUI password hex-encoded (sabnzbd.config.encode_password)
    # so values with '#', spaces, ',' or other ini-unsafe characters survive the
    # configobj parser. Writing raw plaintext breaks login for such passwords, so
    # we pre-encode it the same way; SABnzbd's decode_password reverses it exactly.
    - name: Encode the SABnzbd WebUI password
      ansible.builtin.command:
        cmd: python3 -c 'import os; pw=os.environ["SAB_PW"]; print("!!!encoded!!!" + "".join("%2x" % ord(c) for c in pw))'
      environment:
        SAB_PW: "{{ brrewery_user_password }}"
      register: sabnzbd_encoded_pw
      changed_when: false
      no_log: true

    - name: Configure SABnzbd misc settings
      ansible.builtin.lineinfile:
        path: "{{ sabnzbd_ini }}"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        insertafter: '^\[misc\]'
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0600"
      loop:
        - { regexp: '^host\s*=', line: "host = 127.0.0.1" }
        - { regexp: '^port\s*=', line: "port = {{ sabnzbd_port }}" }
        - { regexp: '^url_base\s*=', line: "url_base = /sabnzbd" }
        - { regexp: '^username\s*=', line: "username = {{ brrewery_user }}" }
      loop_control:
        label: "{{ item.line }}"
      notify: Restart SABnzbd

    - name: Configure SABnzbd WebUI password
      ansible.builtin.lineinfile:
        path: "{{ sabnzbd_ini }}"
        regexp: '^password\s*='
        line: "password = {{ sabnzbd_encoded_pw.stdout }}"
        insertafter: '^\[misc\]'
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0600"
      no_log: true
      notify: Restart SABnzbd

    - name: Install SABnzbd systemd template unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/sabnzbd@.service
        mode: "0644"
        content: |
          [Unit]
          Description=SABnzbd usenet downloader for %i
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=%i
          ExecStart={{ sabnzbd_venv_dir }}/bin/python {{ sabnzbd_install_dir }}/SABnzbd.py --config-file /home/%i/.config/sabnzbd/sabnzbd.ini --browser 0 --logging 1
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start SABnzbd for brrewery user
      ansible.builtin.systemd:
        name: "sabnzbd@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for SABnzbd WebUI to listen
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ sabnzbd_port }}"
        timeout: 60

    - name: Configure nginx reverse proxy for SABnzbd
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_app_id: sabnzbd
        brrewery_app_web_path: /sabnzbd/
        brrewery_app_upstream: http://127.0.0.1:{{ sabnzbd_port }}

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart SABnzbd
      ansible.builtin.systemd:
        name: "sabnzbd@{{ brrewery_user }}.service"
        state: restarted
