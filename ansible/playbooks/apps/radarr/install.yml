---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    radarr_install_dir: /opt/Radarr
    radarr_port: 7878
    # Radarr is distributed as a self-contained .NET tarball from the Servarr
    # update service (not GitHub releases). linux, amd64.
    radarr_download_url: "https://radarr.servarr.com/v1/update/master/updatefile?os=linux&runtime=netcore&arch=x64"
  roles:
    - brrewery_user
  tasks:
    - name: Look up brrewery user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ brrewery_user }}"
      register: brrewery_passwd

    - name: Set brrewery home directory fact
      ansible.builtin.set_fact:
        brrewery_home: "{{ brrewery_passwd.ansible_facts.getent_passwd[brrewery_user][4] }}"

    - name: Ensure brrewery user home directory exists
      ansible.builtin.stat:
        path: "{{ brrewery_home }}"
      register: brrewery_home_dir

    - name: Fail when brrewery user home is missing
      ansible.builtin.fail:
        msg: "Home directory {{ brrewery_home }} for user {{ brrewery_user }} does not exist"
      when: not brrewery_home_dir.stat.exists

    - name: Require brrewery user password for Radarr authentication
      ansible.builtin.assert:
        that:
          - brrewery_user_password is defined
          - brrewery_user_password | length > 0
        fail_msg: brrewery_user_password must be supplied for radarr install

    - name: Install Radarr runtime dependencies
      ansible.builtin.apt:
        # libicu-dev pulls in the matching ICU runtime, which Radarr's bundled
        # .NET requires for globalization (it does not run in invariant mode).
        name: libicu-dev
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Stop Radarr before replacing files
      ansible.builtin.systemd:
        name: "radarr@{{ brrewery_user }}.service"
        state: stopped
      failed_when: false

    - name: Download Radarr release archive
      ansible.builtin.get_url:
        url: "{{ radarr_download_url }}"
        dest: /tmp/radarr.tar.gz
        mode: "0644"

    - name: Remove previous Radarr installation
      ansible.builtin.file:
        path: "{{ radarr_install_dir }}"
        state: absent

    - name: Ensure /opt exists
      ansible.builtin.file:
        path: /opt
        state: directory
        mode: "0755"

    - name: Extract Radarr into /opt
      ansible.builtin.unarchive:
        src: /tmp/radarr.tar.gz
        dest: /opt
        remote_src: true

    - name: Set ownership of Radarr installation
      ansible.builtin.file:
        path: "{{ radarr_install_dir }}"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        recurse: true

    - name: Ensure Radarr data directory exists
      ansible.builtin.file:
        path: "{{ brrewery_home }}/.config/radarr"
        state: directory
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0750"

    - name: Generate Radarr API key
      ansible.builtin.command: openssl rand -hex 16
      register: radarr_api_key_gen
      changed_when: false

    - name: Write Radarr config
      ansible.builtin.copy:
        dest: "{{ brrewery_home }}/.config/radarr/config.xml"
        owner: "{{ brrewery_user }}"
        group: "{{ brrewery_group }}"
        mode: "0640"
        # Never clobber an existing config: the seeded ApiKey and the login user
        # Radarr stores must survive re-runs. Forms auth is enforced for every
        # request (Enabled, not DisabledForLocalAddresses) so the proxied login
        # actually applies; the user itself is provisioned via the API below.
        force: false
        content: |
          <Config>
            <BindAddress>127.0.0.1</BindAddress>
            <Port>{{ radarr_port }}</Port>
            <UrlBase>radarr</UrlBase>
            <ApiKey>{{ radarr_api_key_gen.stdout }}</ApiKey>
            <LaunchBrowser>False</LaunchBrowser>
            <AuthenticationMethod>Forms</AuthenticationMethod>
            <AuthenticationRequired>Enabled</AuthenticationRequired>
            <Branch>master</Branch>
            <LogLevel>info</LogLevel>
            <AnalyticsEnabled>False</AnalyticsEnabled>
          </Config>

    - name: Install Radarr systemd template unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/radarr@.service
        mode: "0644"
        content: |
          [Unit]
          Description=Radarr service for %i
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=%i
          ExecStart={{ radarr_install_dir }}/Radarr -nobrowser -data=/home/%i/.config/radarr
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start Radarr for brrewery user
      ansible.builtin.systemd:
        name: "radarr@{{ brrewery_user }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Read Radarr config to resolve the API key
      ansible.builtin.slurp:
        src: "{{ brrewery_home }}/.config/radarr/config.xml"
      register: radarr_config_raw

    - name: Set Radarr API key fact
      ansible.builtin.set_fact:
        radarr_api_key: "{{ (radarr_config_raw.content | b64decode | regex_findall('<ApiKey>([^<]+)</ApiKey>')) | first }}"
      no_log: true

    - name: Wait for the Radarr API to be ready
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ radarr_port }}/radarr/api/v3/config/host"
        method: GET
        headers:
          X-Api-Key: "{{ radarr_api_key }}"
        status_code: 200
      register: radarr_host_config
      until: radarr_host_config.status == 200
      retries: 30
      delay: 5

    - name: Build Radarr authentication overrides
      ansible.builtin.set_fact:
        radarr_auth_overrides:
          authenticationMethod: forms
          authenticationRequired: enabled
          username: "{{ brrewery_user }}"
          password: "{{ brrewery_user_password }}"
          passwordConfirmation: "{{ brrewery_user_password }}"
      no_log: true

    - name: Configure Radarr forms authentication with brrewery credentials
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ radarr_port }}/radarr/api/v3/config/host/{{ radarr_host_config.json.id }}"
        method: PUT
        headers:
          X-Api-Key: "{{ radarr_api_key }}"
        body_format: json
        body: "{{ radarr_host_config.json | combine(radarr_auth_overrides) }}"
        status_code: [200, 202]
      register: radarr_auth_set
      no_log: true
      when: >-
        radarr_host_config.json.authenticationMethod | lower != 'forms'
        or (radarr_host_config.json.username | default('')) != brrewery_user

    - name: Restart Radarr to apply authentication
      ansible.builtin.systemd:
        name: "radarr@{{ brrewery_user }}.service"
        state: restarted
      when: radarr_auth_set is changed

    - name: Wait for Radarr to come back up after restart
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ radarr_port }}"
        timeout: 120
      when: radarr_auth_set is changed

    - name: Configure nginx reverse proxy for radarr
      ansible.builtin.include_role:
        name: brrewery_nginx_site
      vars:
        brrewery_app_id: radarr
        brrewery_app_web_path: /radarr/
        brrewery_app_upstream: http://127.0.0.1:{{ radarr_port }}

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
