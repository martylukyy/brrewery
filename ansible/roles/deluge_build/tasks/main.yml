---
- name: Resolve deluge build profile from the manifest
  ansible.builtin.import_tasks: resolve.yml

- name: Install build dependencies
  ansible.builtin.import_tasks: dependencies.yml

# Deluge 1.3 is Python 2 only; modern Debian has no Python 2.7, so build CPython
# 2.7 + OpenSSL 1.1 from source for the legacy line before anything links them.
- name: Build the legacy Python 2.7 toolchain (1.3 line only)
  ansible.builtin.import_tasks: python27.yml
  when: deluge_legacy | bool

- name: Stage and bootstrap Boost
  ansible.builtin.import_tasks: boost.yml

- name: Create the Deluge virtualenv
  ansible.builtin.import_tasks: venv.yml

# libtorrent must be built and dropped into the venv before Deluge so Deluge's
# "import libtorrent" resolves to our tuned, statically linked module.
- name: Build libtorrent python bindings into the venv
  ansible.builtin.import_tasks: libtorrent.yml

- name: Install Deluge into the venv
  ansible.builtin.import_tasks: deluge.yml
