---
# Expose the venv entrypoints on PATH so `deluged` is detectable (brrewery checks
# /usr/local/bin) and the console client is usable. The systemd units invoke the
# venv binaries directly (with the legacy loader path), not these symlinks.
- name: Symlink Deluge entrypoints into /usr/local/bin
  ansible.builtin.file:
    src: "{{ deluge_venv }}/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
    force: true
  loop:
    - deluged
    - deluge-web
    - deluge-console

- name: Install deluged systemd template unit
  ansible.builtin.template:
    src: deluged@.service.j2
    dest: /etc/systemd/system/deluged@.service
    mode: "0644"
  notify: Reload systemd

- name: Install deluge-web systemd template unit
  ansible.builtin.template:
    src: deluge-web@.service.j2
    dest: /etc/systemd/system/deluge-web@.service
    mode: "0644"
  notify: Reload systemd
