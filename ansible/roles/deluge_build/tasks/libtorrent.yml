---
# Build libtorrent-rasterbar's Python bindings as a single statically linked
# extension module and drop it into the Deluge venv. The module statically links
# libtorrent + Boost (incl. Boost.Python) and dynamically links only the system
# C/C++ runtime and OpenSSL, so Deluge's "import libtorrent" is fully self
# contained.
- name: Reset the libtorrent scratch source tree
  ansible.builtin.file:
    path: "{{ deluge_build_root }}/libtorrent"
    state: absent

# --branch takes the pinned tag (dz_libtorrent_tag) so the build is reproducible;
# --single-branch --depth 1 still fetches only the history reachable from it.
- name: Clone libtorrent {{ dz_libtorrent_tag }} ({{ dz_libtorrent_branch }})
  ansible.builtin.command:
    cmd: >-
      git clone --no-tags --single-branch --branch {{ dz_libtorrent_tag }}
      --shallow-submodules --recurse-submodules -j{{ deluge_build_jobs }} --depth 1
      https://github.com/arvidn/libtorrent.git {{ deluge_build_root }}/libtorrent
    creates: "{{ deluge_build_root }}/libtorrent/Jamfile"
  environment:
    SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    SSL_CERT_DIR: /etc/ssl/certs

# RC_1_1 (the Deluge 1.3 line) predates the install_module target and was written
# for an older toolchain. Three vendored/source fixes make it build with GCC 14 +
# Boost 1.86: the install_module Jamfile target, the <map> includes GCC 14 no
# longer pulls in transitively, and bringing Boost's _1.._N placeholders (moved
# out of global scope) into the binding sources that use them.
- name: Apply RC_1_1 legacy build compatibility fixes
  when: dz_libtorrent_branch == 'RC_1_1'
  block:
    - name: Apply vendored RC_1_1 Jamfile patch (adds install_module target)
      ansible.builtin.command:
        cmd: patch -p1 --forward -i "{{ deluge_vendor_root }}/patches/libtorrent-RC_1_1-Jamfile.patch"
        chdir: "{{ deluge_build_root }}/libtorrent"
      register: dz_rc11_jamfile
      changed_when: dz_rc11_jamfile.rc == 0
      failed_when: dz_rc11_jamfile.rc > 1

    # torrent_info.hpp includes <vector>, rss.hpp only <string>; anchor on
    # whichever the header already has so the <map> include lands either way.
    - name: Add missing <map> includes (GCC 14 transitive-include hygiene)
      ansible.builtin.shell:
        cmd: >-
          for f in include/libtorrent/torrent_info.hpp include/libtorrent/rss.hpp; do
            grep -q '#include <map>' "$f" && continue;
            sed -i '0,/#include <vector>/s//#include <vector>\n#include <map>/' "$f";
            grep -q '#include <map>' "$f" || sed -i '0,/#include <string>/s//#include <string>\n#include <map>/' "$f";
          done
        chdir: "{{ deluge_build_root }}/libtorrent"
      changed_when: true

    - name: Bring Boost placeholders into scope for the python bindings
      ansible.builtin.shell:
        cmd: >-
          for f in bindings/python/src/create_torrent.cpp bindings/python/src/session.cpp; do
            grep -q 'using namespace boost::placeholders' "$f" ||
              sed -i '0,/using namespace libtorrent;/s//using namespace libtorrent;\nusing namespace boost::placeholders;/' "$f";
          done
        chdir: "{{ deluge_build_root }}/libtorrent"
      changed_when: true

- name: Write the b2 user-config.jam (gcc + the target python interpreter)
  ansible.builtin.copy:
    dest: "{{ deluge_build_root }}/user-config.jam"
    mode: "0644"
    content: |
      using gcc ;
      using python : {{ dz_python_major }} : {{ dz_python_interp }} : {{ dz_python_include }} : {{ dz_python_lib }} ;

# The python3 lines link the system OpenSSL: its static libcrypto.a references
# zstd/zlib (OpenSSL 3 compression) that b2 does not link, so append the runtime
# sonames. The legacy line links the vendored OpenSSL 1.1 (clean, no compression
# refs) directly via openssl-include/openssl-lib.
- name: Compose b2 crypto link arguments
  ansible.builtin.set_fact:
    dz_b2_crypto_argv: >-
      {{ ['openssl-include=' ~ deluge_openssl11_prefix ~ '/include',
          'openssl-lib=' ~ deluge_openssl11_prefix ~ '/lib']
         if dz_legacy | bool
         else ['linkflags=' ~ dz_link_libs] }}

- name: Compose the b2 build command
  ansible.builtin.set_fact:
    dz_b2_argv: >-
      {{ [dz_boost_root_path ~ '/b2',
          '-j' ~ deluge_build_jobs,
          '--user-config=' ~ deluge_build_root ~ '/user-config.jam',
          'python=' ~ dz_python_major,
          'crypto=openssl',
          'cflags=' ~ dz_compiler_flags,
          'cxxflags=' ~ dz_compiler_flags ~ ' -std=' ~ dz_cxx_std,
          'variant=release',
          'libtorrent-link=static',
          'boost-link=static',
          'install_module',
          'python-install-path=' ~ deluge_build_root ~ '/dist']
         + dz_b2_crypto_argv }}

- name: Build and install the libtorrent python module
  ansible.builtin.command:
    argv: "{{ dz_b2_argv }}"
    chdir: "{{ deluge_build_root }}/libtorrent/bindings/python"
  environment:
    BOOST_ROOT: "{{ dz_boost_root_path }}"
    BOOST_INCLUDEDIR: "{{ dz_boost_root_path }}"
    BOOST_BUILD_PATH: "{{ dz_boost_root_path }}"
    LD_LIBRARY_PATH: "{{ dz_legacy_ld }}"

- name: Locate the built libtorrent module
  ansible.builtin.find:
    paths: "{{ deluge_build_root }}/dist"
    patterns: "libtorrent*.so"
    recurse: true
  register: dz_lt_module

- name: Fail when the libtorrent module was not produced
  ansible.builtin.assert:
    that:
      - dz_lt_module.matched | int > 0
    fail_msg: "libtorrent python module build did not produce a .so"

- name: Install the libtorrent module into the Deluge venv
  ansible.builtin.copy:
    src: "{{ dz_lt_module.files[0].path }}"
    dest: "{{ dz_venv_site }}/libtorrent.so"
    remote_src: true
    mode: "0755"

- name: Verify the libtorrent module imports under the venv interpreter
  ansible.builtin.command:
    cmd: "{{ deluge_venv }}/bin/python -c 'import libtorrent as lt; print(lt.version)'"
  environment:
    LD_LIBRARY_PATH: "{{ dz_legacy_ld }}"
  register: dz_lt_import
  changed_when: false

- name: Announce the built libtorrent version
  ansible.builtin.debug:
    msg: "libtorrent module {{ dz_lt_import.stdout }} ({{ dz_libtorrent_tag }}, {{ dz_libtorrent_branch }}) installed into {{ deluge_venv }}"
