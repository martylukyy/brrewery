---
# Best effort: a stale or read-only apt cache should not abort the build when
# the existing cache already satisfies the dependencies below.
- name: Refresh apt cache (best effort)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  failed_when: false

# Toolchain + headers shared by every line:
#   - compiler/toolchain, git (clones libtorrent + Deluge), pkg-config
#   - python3 + venv + dev headers: the python3 lines build their bindings and
#     run Deluge under the system interpreter
#   - libssl-dev: the python3 lines link libtorrent against the system OpenSSL;
#     libzstd1/zlib1g supply the runtime sonames that static libcrypto.a needs
#   - libjpeg/zlib dev: Pillow (a Deluge dependency) compiles against them when
#     no wheel is available
- name: Install common Deluge/libtorrent build dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - git
      - ca-certificates
      - pkg-config
      - python3
      - python3-dev
      - python3-venv
      - python3-pip
      - libssl-dev
      - libzstd1
      - zlib1g
      - libjpeg-dev
      - zlib1g-dev
    state: present
