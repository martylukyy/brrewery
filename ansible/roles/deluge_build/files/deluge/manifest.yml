# Vendored build manifest for Deluge (deluge-torrent/deluge).
#
# Deluge is a Python application; the only thing compiled from source is its
# libtorrent-rasterbar (arvidn/libtorrent) dependency, built WITH Python bindings
# and statically linked, then dropped into a self-contained virtualenv alongside
# Deluge installed from its GitHub source tag.
#
# Each entry under `lines` is a complete, self-contained build profile for one
# selectable Deluge release line. Only the Deluge release itself is resolved from
# upstream before Ansible runs (the newest deluge-<series>.* tag on GitHub, see
# internal/apps/deluge); every build *dependency* is pinned per line like a
# lockfile (package.json-style), so builds are reproducible instead of tracking
# upstream "latest". There is no shared `defaults` block: each line pins its own
# compiler flags, libtorrent tag and Boost (per libtorrent branch), and the
# legacy line additionally pins its from-source OpenSSL 1.1 / CPython 2.7.
#
# Boost is pinned per libtorrent branch because its compatibility is tied to the
# branch: 1.86 is the newest Boost that still ships boost::asio::io_service, which
# libtorrent RC_1_2/RC_1_1 consume (1.87 removed it). One Boost source tree is
# built per install and reused for that install's libtorrent build.
#
# compiler_flags is host-tuned but ISA-portable. -mtune=native optimizes
# scheduling for the build host without emitting instructions beyond the x86-64
# baseline. Do NOT use -march=native: it bakes the host's newest features into the
# binary and makes libtorrent SIGILL at runtime on any CPU lacking them. (This is
# the tuning knob shared with the qBittorrent libtorrent build.)
#
# Refresh a line's pinned versions (compiler_flags, each libtorrent branch's tag
# and boost, and the legacy openssl11_version / python27_version) when upstream
# ships a newer compatible release. See docs/deluge-build-manifest.md.

lines:
  - version: "2.2.x"
    series: "2.2"
    python: python3
    cxx_std: "c++17"
    compiler_flags: "-O3 -mtune=native"
    # Debian's system libcrypto.a (static) references zstd/zlib symbols (OpenSSL 3
    # built with compression) that b2 does not link. Append the runtime sonames so
    # the archive's references resolve. Only the python3 lines link system OpenSSL.
    libtorrent_link_libs: "-l:libzstd.so.1 -l:libz.so.1"
    # setuptools >= 81 dropped pkg_resources, which Deluge < 2.2 imports; pin it
    # for every python3 line (no-op for 2.2, which uses importlib.metadata).
    setuptools: "<81"
    libtorrent:
      default: RC_1_2
      branches:
        RC_1_2:
          tag: "v1.2.20"
          boost: "1_86_0"
        RC_2_0:
          tag: "v2.0.11"
          boost: "1_86_0"

  - version: "2.1.x"
    series: "2.1"
    python: python3
    cxx_std: "c++17"
    compiler_flags: "-O3 -mtune=native"
    libtorrent_link_libs: "-l:libzstd.so.1 -l:libz.so.1"
    setuptools: "<81"
    libtorrent:
      default: RC_1_2
      branches:
        RC_1_2:
          tag: "v1.2.20"
          boost: "1_86_0"
        RC_2_0:
          tag: "v2.0.11"
          boost: "1_86_0"

  - version: "2.0.x"
    series: "2.0"
    python: python3
    cxx_std: "c++17"
    compiler_flags: "-O3 -mtune=native"
    libtorrent_link_libs: "-l:libzstd.so.1 -l:libz.so.1"
    setuptools: "<81"
    libtorrent:
      default: RC_1_2
      branches:
        RC_1_2:
          tag: "v1.2.20"
          boost: "1_86_0"
        RC_2_0:
          tag: "v2.0.11"
          boost: "1_86_0"

  - version: "1.3.x"
    series: "1.3"
    # Deluge 1.3 is Python 2 only. Debian 13 dropped Python 2.7, so the role
    # builds CPython 2.7 + OpenSSL 1.1 from source for this line (see python27.yml)
    # and pairs it with libtorrent RC_1_1 (the last branch with Python 2 bindings).
    python: python2.7
    cxx_std: "c++14"
    compiler_flags: "-O3 -mtune=native"
    # Last setuptools that supports Python 2.7.
    setuptools: "<45"
    legacy: true
    # Legacy toolchain built from source for this line only (Python 2.7 was removed
    # from Debian; its _ssl needs OpenSSL <= 1.1).
    openssl11_version: "1.1.1w"
    python27_version: "2.7.18"
    libtorrent:
      default: RC_1_1
      branches:
        # RC_1_1's last release predates the vX.Y.Z tag scheme (arvidn/libtorrent
        # used libtorrent-M_m_p for the 1.1 series).
        RC_1_1:
          tag: "libtorrent-1_1_14"
          boost: "1_86_0"
