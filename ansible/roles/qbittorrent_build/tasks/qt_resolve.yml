---
- name: Require Qt version resolved by brrewery
  ansible.builtin.assert:
    that:
      - qbittorrent_qt_version is defined
      - qbittorrent_qt_version | length > 0
    fail_msg: >-
      qbittorrent_qt_version must be supplied by brrewery before the playbook runs
      (resolved from download.qt.io against manifest qt.min).

- name: Use Qt version from brrewery extra vars
  ansible.builtin.set_fact:
    qbt_qt_version: "{{ qbittorrent_qt_version }}"

- name: Fail when resolved Qt is below the line minimum
  ansible.builtin.shell: |
    set -o pipefail
    dpkg --compare-versions "{{ qbt_qt_version }}" ge "{{ qbt_qt_min }}"
  args:
    executable: /bin/bash
  register: qbt_qt_version_check
  changed_when: false
  failed_when: qbt_qt_version_check.rc != 0
