openapi: 3.0.3
info:
  title: brrewery API
  version: 0.1.0
  description: Package catalog and session-authenticated management API.
servers:
  - url: /
    description: Current host
components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: cookie
      name: session
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthResponse:
      type: object
      properties:
        status:
          type: string
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      properties:
        username:
          type: string
    VersionInfo:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        date:
          type: string
    DetectionSpec:
      type: object
      properties:
        binaries:
          type: array
          items:
            type: string
        systemd_units:
          type: array
          items:
            type: string
        systemd_user_units:
          type: array
          description: Systemd unit templates expanded with the brrewery admin username ({user} placeholder).
          items:
            type: string
        paths:
          type: array
          items:
            type: string
        depends_on:
          type: array
          items:
            type: string
    PlaybookPaths:
      type: object
      properties:
        install:
          type: string
        upgrade:
          type: string
        remove:
          type: string
    InstallSecret:
      type: object
      required: [key, label, type]
      properties:
        key:
          type: string
          description: Extra-var key supplied in the install request.
        label:
          type: string
        type:
          type: string
          enum: [password]
        verify_brrewery_password:
          type: boolean
          description: When true, the value must match the logged-in brrewery account password.
        disable_password_manager:
          type: boolean
          description: When true, the UI should not offer password-manager autofill or save prompts.
    InstallOptionChoice:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
          description: Value submitted as the extra-var when this choice is selected.
        label:
          type: string
    InstallOptionWhen:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: Another option key whose selected value gates this option.
        one_of:
          type: array
          description: This option is shown only when the gating option's value is one of these.
          items:
            type: string
    InstallOption:
      type: object
      required: [key, label, type]
      properties:
        key:
          type: string
          description: Extra-var key supplied in the install request.
        label:
          type: string
        type:
          type: string
          enum: [select]
        choices:
          type: array
          items:
            $ref: '#/components/schemas/InstallOptionChoice'
        when:
          $ref: '#/components/schemas/InstallOptionWhen'
    Package:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        icon:
          type: string
          description: URL path to the package icon bundled with the brrewery frontend.
        web_path:
          type: string
          description: Reverse-proxy path used to open the installed application.
        install_secrets:
          type: array
          items:
            $ref: '#/components/schemas/InstallSecret'
        install_options:
          type: array
          description: User-selected build parameters (e.g. qBittorrent version, libtorrent branch).
          items:
            $ref: '#/components/schemas/InstallOption'
        dependencies:
          type: array
          items:
            type: string
        detection:
          $ref: '#/components/schemas/DetectionSpec'
        playbooks:
          $ref: '#/components/schemas/PlaybookPaths'
    PackageStatus:
      allOf:
        - $ref: '#/components/schemas/Package'
        - type: object
          properties:
            installed:
              type: boolean
            dependencies_satisfied:
              type: boolean
    PackageListResponse:
      type: object
      properties:
        packages:
          type: array
          items:
            $ref: '#/components/schemas/PackageStatus'
    JobAction:
      type: string
      enum: [install, upgrade, remove]
    JobStatus:
      type: string
      enum: [queued, running, succeeded, failed]
    Job:
      type: object
      required: [id, package_id, action, status, started_at]
      properties:
        id:
          type: string
        package_id:
          type: string
        action:
          $ref: '#/components/schemas/JobAction'
        status:
          $ref: '#/components/schemas/JobStatus'
        error:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
    InstallRequest:
      type: object
      properties:
        extra_vars:
          type: object
          description: >-
            Install/upgrade parameters passed to Ansible. Values for install_secrets
            and install_options are supplied here. For qBittorrent, the optional
            libtorrent_patch key may carry a base64-encoded unified-diff libtorrent
            patch (max 512 KiB decoded) applied to a single build; it is never
            persisted to disk by brrewery.
          additionalProperties:
            type: string
    InstallResponse:
      type: object
      required: [job_id]
      properties:
        job_id:
          type: string
    JobLogsResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            type: string
    LoadAvg:
      type: object
      properties:
        "1m":
          type: number
          format: double
        "5m":
          type: number
          format: double
        "15m":
          type: number
          format: double
    SystemMemory:
      type: object
      properties:
        total_bytes:
          type: integer
          format: int64
        available_bytes:
          type: integer
          format: int64
        used_bytes:
          type: integer
          format: int64
        used_percent:
          type: number
          format: double
    SystemDisk:
      type: object
      properties:
        mount:
          type: string
        total_bytes:
          type: integer
          format: int64
        used_bytes:
          type: integer
          format: int64
        available_bytes:
          type: integer
          format: int64
        used_percent:
          type: number
          format: double
        io_busy_percent:
          type: number
          format: double
          description: Block-device I/O busy percent for this mount (iostat %util from sysfs stat).
        io_read_bytes:
          type: integer
          format: int64
          description: Cumulative read bytes for disk backing this mount.
        io_write_bytes:
          type: integer
          format: int64
          description: Cumulative write bytes for disk backing this mount.
    NetworkCounters:
      type: object
      properties:
        rx_bytes:
          type: integer
          format: int64
        tx_bytes:
          type: integer
          format: int64
    DiskIOCounters:
      type: object
      properties:
        read_bytes:
          type: integer
          format: int64
        write_bytes:
          type: integer
          format: int64
        read_ops:
          type: integer
          format: int64
        write_ops:
          type: integer
          format: int64
    TrafficPeriod:
      type: object
      properties:
        label:
          type: string
        rx_bytes:
          type: integer
          format: int64
        tx_bytes:
          type: integer
          format: int64
    VnstatReport:
      type: object
      properties:
        installed:
          type: boolean
        message:
          type: string
        version:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/TrafficPeriod'
        months:
          type: array
          items:
            $ref: '#/components/schemas/TrafficPeriod'
    SystemInfo:
      type: object
      properties:
        hostname:
          type: string
        uptime_seconds:
          type: number
          format: double
        cpu_count:
          type: integer
        cpu_name:
          type: string
        cpu_percent:
          type: number
          format: double
        load:
          $ref: '#/components/schemas/LoadAvg'
        memory:
          $ref: '#/components/schemas/SystemMemory'
        disks:
          type: array
          items:
            $ref: '#/components/schemas/SystemDisk'
          description: Disk usage for fstab mount points (swap and EFI excluded).
        disk:
          $ref: '#/components/schemas/SystemDisk'
          deprecated: true
          description: Deprecated. First entry of disks, kept for older clients.
        network:
          $ref: '#/components/schemas/NetworkCounters'
        disk_io:
          $ref: '#/components/schemas/DiskIOCounters'
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      summary: Logout
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Logged out
  /api/v1/version:
    get:
      summary: Version metadata
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/packages:
    get:
      summary: List packages
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Package list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/packages/{id}:
    get:
      summary: Get package by ID
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Package detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageStatus'
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /api/v1/packages/{id}/install:
    post:
      summary: Start package install job
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallRequest'
      responses:
        '202':
          description: Install job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Package not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Package already installed or dependencies not satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/packages/{id}/upgrade:
    post:
      summary: Start package upgrade job
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallRequest'
      responses:
        '202':
          description: Upgrade job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Package not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Package not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/packages/{id}/remove:
    post:
      summary: Start package remove job
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallRequest'
      responses:
        '202':
          description: Remove job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Package not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Package not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/jobs/{id}:
    get:
      summary: Get install job status
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/jobs/{id}/logs:
    get:
      summary: Get install job logs
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job log lines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobLogsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/system:
    get:
      summary: Host system metrics
      security:
        - SessionAuth: []
      responses:
        '200':
          description: System metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not available on this platform
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/traffic/vnstat:
    get:
      summary: Historic traffic from vnstat
      security:
        - SessionAuth: []
      responses:
        '200':
          description: vnstat report or not-installed notice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VnstatReport'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: vnstat query failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
