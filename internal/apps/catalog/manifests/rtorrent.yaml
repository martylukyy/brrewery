# rTorrent has no web UI of its own (ruTorrent provides one). It is built from
# source with a user-selected version; the version picker is registered at
# runtime from the vendored build manifest (internal/apps/rtorrent), so no
# static install_options are declared here. The frontend icon registry keys this
# logo under rtorrent and reuses it for ruTorrent (web/src/lib/app-icons.ts).
id: rtorrent
name: rTorrent
description: BitTorrent client
category: download
# Install builds from source and writes a per-user systemd unit, which needs
# sudo: this adds the shared account-password prompt (reused as the become
# password).
requires_account_password: true
detection:
  binaries:
    - rtorrent
  systemd_user_units:
    - "rtorrent@{user}.service"
