<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — brrewery</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
        background-color: oklch(0.141 0.005 285.823);
        color: oklch(0.985 0 0);
        font-family: "Nunito Sans Variable", ui-sans-serif, system-ui,
          -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        width: 100%;
        max-width: 26rem;
        padding: 2.5rem 2rem;
        text-align: center;
        background-color: oklch(0.21 0.006 285.885);
        border: 1px solid oklch(1 0 0 / 10%);
        border-radius: 0.75rem;
        box-shadow: 0 0 32px 0 color-mix(in oklab, white 6%, transparent);
      }
      .code {
        margin: 0;
        font-size: 4rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
      }
      h1 {
        margin: 1rem 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p.message {
        margin: 0 0 1.75rem;
        color: oklch(0.705 0.015 286.067);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      a.home {
        display: inline-block;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        color: oklch(0.21 0.006 285.885);
        background-color: oklch(0.92 0.004 286.32);
        border-radius: 0.5rem;
        transition: opacity 0.15s ease;
      }
      a.home:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <main>
      <p class="code">404</p>
      <h1>Page not found</h1>
      <p class="message">
        The page you’re looking for doesn’t exist or may have moved.
      </p>
      <a class="home" href="/">Return to dashboard</a>
    </main>
  </body>
</html>
